name: Dashboard Refresh

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00am IST daily (UTC+5:30 = 00:30 UTC)
  workflow_dispatch:         # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run pipeline (market prices + RSS + render)
        run: python pipeline.py

      - name: Commit updated dashboard
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add dashboard.html data/market_prices.json data/geopolitical_news.json
          git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
